<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Sender Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 5px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .alert.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .alert.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .alert.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 Mail Sender Bot</h1>
    <p class="subtitle">Invia email personalizzate con anteprima contenuto</p>

    <div id="alert" class="alert"></div>

    <form id="emailForm">
      <div class="form-group">
        <label for="recipientEmail">📧 Email Destinatario:</label>
        <input
          type="email"
          id="recipientEmail"
          name="recipientEmail"
          placeholder="destinatario@example.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="personalizationText">✏️ Testo Personalizzato:</label>
        <textarea
          id="personalizationText"
          name="personalizationText"
          placeholder="Scrivi un messaggio personale per il destinatario..."
          required
        ></textarea>
      </div>

      <div class="form-group">
        <label for="contentLink">🔗 Link al Contenuto:</label>
        <input
          type="url"
          id="contentLink"
          name="contentLink"
          placeholder="https://example.com/content"
          required
        />
      </div>

      <div class="loading" id="loading">
        <span class="spinner"></span>
        Invio email in corso...
      </div>

      <button type="submit" id="submitBtn">Invia Email 🚀</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('emailForm');
    const alert = document.getElementById('alert');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(message, type) {
      alert.textContent = message;
      alert.className = `alert ${type}`;
      setTimeout(() => {
        alert.className = 'alert';
      }, 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const recipientEmail = document.getElementById('recipientEmail').value;
      const personalizationText = document.getElementById('personalizationText').value;
      const contentLink = document.getElementById('contentLink').value;

      submitBtn.disabled = true;
      loading.style.display = 'block';

      try {
        const response = await fetch('/api/send-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            recipientEmail,
            personalizationText,
            contentLink,
          }),
        });

        const data = await response.json();

        if (data.success) {
          showAlert('✅ ' + data.message, 'success');
          form.reset();
        } else {
          showAlert('❌ ' + data.message, 'error');
        }
      } catch (error) {
        showAlert('❌ Errore: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
